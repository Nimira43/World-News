version: "3.9"

services:
  mongodb:
    image: mongo:6.0
    container_name: world-news-mongo
    restart: always
    ports:
      - "7007:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - world-news:/data/db

volumes:
  world-news:
